name: Mirror Ollama release

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exécuter le script de mirroir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/mirror.sh

      - name: Committer la version mirrorée
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet -- last_version.txt; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add last_version.txt
            git commit -m "chore: mise à jour version mirrorée"
            git push
          fi
